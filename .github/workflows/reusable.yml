name: Reusable Deploy
on:
  workflow_call: # allows this WF to be called from another WF
    inputs:
      artifact-name:
        description: The name of the deployable artifact files
        required: true
        default: dist
        type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/download-artifact@v4
        with:
          name: ${{inputs.artifact-name}} # instead of hardcoding e.g.: dist-files
      - name: List files
        run: ls
      - name: Output information
        run: echo "Deploying and uploading"